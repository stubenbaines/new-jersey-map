name: Build Windows Installer (Tauri)

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - "src/**"
      - "public/**"
      - "src-tauri/**"
      - "package.json"
      - "package-lock.json"
      - "vite.config.ts"
      - ".github/workflows/tauri-windows.yml"

jobs:
  windows-build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Install Tauri CLI
        run: cargo install tauri-cli --locked

      - name: Build installer
        run: npm run tauri:build

      - name: Upload NSIS bundle
        uses: actions/upload-artifact@v4
        with:
          name: nj-visits-tracker-windows-nsis
          path: src-tauri/target/release/bundle/nsis/*
          if-no-files-found: error
